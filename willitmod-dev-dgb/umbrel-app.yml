manifestVersion: 1
id: willitmod-dev-dgb
category: altcoin
name: AxeDGB
version: "0.9.156-dev"
tagline: DGB node + solo pool
description: >-
  THESE APPS ARE IN DEVELOPMENT. THEY MAY WORK, THEY MAY NOT. THESE ARE FOR TESTING ONLY.
  If you want to support development, then use these apps and provide HELPFUL feedback.
  If you want a working known good app, then DO NOT USE DEV APPS.

  Run a DigiByte full node (DigiByte Core) and an integrated solo Stratum v1 pool (Miningcore) as a single app.


  Features:
    - Axe-style dashboard for node sync, Stratum status, and pool stats
    - SHA256 + Scrypt Stratum ports in one app install
    - SHA256 difficulty presets (vardiff) for small miners through to high-hashrate rigs
    - Community support via Discord


  Miner connection:
    - Set your solo payout address in the app Settings tab.
    - SHA256 Stratum URL: `stratum+tcp://<your-host-ip>:5678`
    - Scrypt Stratum URL: `stratum+tcp://<your-host-ip>:5679`
    - Username: a worker label (recommended: `rig01.workername`). `walletAddress.workername` also works, but it does not control payout.
    - Password: anything


  Notes:
    - Payout address must be a legacy/base58 DigiByte address (starts with `D`/`S`). `dgb1...` payout is not supported yet.
    - Initial sync can take a long time and a lot of bandwidth/storage (the node downloads and validates the chain).
    - Like most chains, transactions may include arbitrary data; use at your own risk and comply with local laws.
    - First sync and the first boot after some upgrades can be heavy on RAM and disk. 16GB is recommended; 8GB is the practical minimum.
    - Solo mining is extremely unlikely to find blocks without significant hashrate.


  Components:
    - DigiByte Core (MIT): https://github.com/digibyte-core/digibyte
    - Miningcore (GPLv3): https://github.com/oliverw/miningcore


  Status:
    - BETA build: expect bugs and breaking changes. Verify payout addresses before mining.
developer: WillItMod
website: https://github.com/WillItMod/umbrel-dev-community-store
repo: https://github.com/WillItMod/umbrel-dev-community-store
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21213
icon: https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-dgb/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-dgb/icon.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-dgb/images/1.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-dgb/images/2.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-dgb/images/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axedgb-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "DGB sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axedgb-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best diff"
          text: "21"
          subtext: ""
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
