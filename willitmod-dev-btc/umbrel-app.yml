manifestVersion: 1
id: willitmod-dev-btc
category: bitcoin
name: AxeBTC
version: "0.7.82.6-dev"
tagline: BTC node + solo pool
description: >-
  THESE APPS ARE IN DEVELOPMENT. THEY MAY WORK, THEY MAY NOT. THESE ARE FOR TESTING ONLY.
  If you want to support development, then use these apps and provide HELPFUL feedback.
  If you want a working known good app, then DO NOT USE DEV APPS.

  Run a Bitcoin (BTC) full node (Bitcoin Core or Bitcoin Knots) and an integrated solo Stratum v1 pool (ckpool) as a single app.

  Miner connection:
    - URL: `stratum+tcp://<your-host-ip>:7890`
    - Username: worker name (optional)
    - Password: anything


  Notes:
    - Initial sync can take a long time and a lot of bandwidth/storage (the node downloads and validates the chain).
    - Blockchains can carry arbitrary data (e.g. via `OP_RETURN`). That’s not unique to any one chain.
    - Set your payout address in the app Settings tab.
    - Pool settings apply automatically; miners may briefly reconnect after saving.
    - On first launch you must pick Bitcoin Core vs Knots before sync starts.
    - Switching Core/Knots triggers an in-app migration and can take a while; avoid restarting the app or powering off the host while it migrates.
    - BTC payout addresses support bech32 (`bc1...`) and legacy (`1...` / `3...`). Bitcoin Cash CashAddr (`q...` / `p...`) is not supported.
developer: WillItMod
website: https://github.com/WillItMod/umbrel-dev-community-store
repo: https://github.com/WillItMod/umbrel-dev-community-store
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21215
icon: "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/icon.png"
gallery:
  - "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/icon.png"
  - "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/images/1.png"
  - "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/images/2.png"
  - "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/images/3.png"
  - "https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-btc/images/4.png"
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axebtc-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "BTC sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axebtc-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best Share"
          text: "21"
          subtext: "G"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
