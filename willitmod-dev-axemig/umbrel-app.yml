id: willitmod-dev-axemig
category: bitcoin
name: AxeMIG
version: "0.1.17"
tagline: Data-only blockchain migration tool
description: >-
  THESE APPS ARE IN DEVELOPMENT. THEY MAY WORK, THEY MAY NOT. THESE ARE FOR TESTING ONLY.
  If you want to support development, then use these apps and provide HELPFUL feedback.
  If you want a working known good app, then DO NOT USE DEV APPS.

  EXPERIMENTAL - PRE ALPHA - USE WITH CAUTION.


  AxeMIG helps you move/copy chain data (blocks/chainstate, optional peers/indexes) between Umbrel node apps.
  It does not migrate configs, secrets, cookies, or wallets.


  Typical workflow:
    - Install the target node app (AxeBTCF / AxeBCH / AxeDGB / etc) and start it until it shows Synchronising (IBD started), then stop it.
    - Stop the source node app (Umbrel Bitcoin / Knots / etc).
    - Run AxeMIG migration, then start the target node app and verify.


  If something goes wrong, use AxeMIG Undo to restore the target's previous state.
