version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: axebch2-app
      APP_PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - umbrel_main_network

  init_permissions:
    image: alpine:3.22.1
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - /bin/sh
      - -ec
      - |-
        set -eu
        mkdir -p /data/ui/state /data/node /data/pool/config /data/pool/www/pool /data/pool/www/users
        chown -R 1000:1000 /data/ui /data/node /data/pool || true

  app:
    image: ghcr.io/willitmod/axebch2-app:0.1.1-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      bch2:
        condition: service_started
      ckpool:
        condition: service_started
    networks:
      default:
        aliases:
          - axebch2-app
      umbrel_main_network:
        aliases:
          - axebch2-app
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      APP_VERSION: "0.1.1"
      APP_CHANNEL: "DEV"
      NETWORK_IP: "${NETWORK_IP}"
      BCH2_NODE_IMAGE: "ghcr.io/willitmod/axebch2-node:0.1.1-dev"
      CKPOOL_IMAGE: "ghcr.io/willitmod/axebch2-ckpool:0.1.1-dev"
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASS: "${APP_PASSWORD}"
      CKPOOL_STRATUM_HOST: "ckpool"
      CKPOOL_STRATUM_PORT: "3333"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3000/api/about', timeout=3); sys.exit(0 if r.status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  bch2:
    image: ghcr.io/willitmod/axebch2-node:0.1.1-dev
    restart: unless-stopped
    depends_on:
      init_permissions:
        condition: service_completed_successfully
    environment:
      NETWORK: "mainnet"
      RPC_USER: "bch2"
      RPC_PASSWORD: "${APP_PASSWORD}"
      RPC_PORT: "8342"
      P2P_PORT: "8339"
      PRUNE: "2250"
      RPC_THREADS: "4"
      MAX_MEMPOOL: "64"
      DB_CACHE: "256"
      TX_INDEX: "0"
    ports:
      - "8339:8339/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/node:/data/node
    healthcheck:
      test:
        - CMD-SHELL
        - 'pid=$$(cat /data/node/bitcoincashIId.pid 2>/dev/null || true); [ -n "$$pid" ] && kill -0 "$$pid" 2>/dev/null'
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 3m

  ckpool:
    image: ghcr.io/willitmod/axebch2-ckpool:0.1.1-dev
    restart: unless-stopped
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      bch2:
        condition: service_started
    environment:
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASSWORD: "${APP_PASSWORD}"
      BCH2_ZMQ_HASHBLOCK_PORT: "28342"
      PAYOUT_ADDRESS: "CHANGEME_BCH_PAYOUT_ADDRESS"
      MINDIFF: "1"
      STARTDIFF: "16"
      MAXDIFF: "0"
    command: ["-L", "-c", "/data/pool/config/ckpool.conf"]
    ports:
      - "9265:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/pool:/data/pool

networks:
  umbrel_main_network:
    external: true
    name: umbrel_main_network
