manifestVersion: 1
id: willitmod-dev-axebch2
category: altcoin
name: "AxeBCH2"
version: "0.1.30-dev"
tagline: BCH2 node + solo pool (experimental dev)
description: >-
  WARNING: EXPERIMENTAL-DEV (TESTING ONLY)

  May break often. May not work. You have been warned!

  THIS APP IS IN DEVELOPMENT. IT MAY WORK, IT MAY NOT. THIS IS FOR TESTING ONLY.
  If you want to support development, use this app and provide HELPFUL feedback.
  If you want a working known-good app, DO NOT USE DEV APPS.

  Miner connection:
    - URL: `stratum+tcp://<your-5tratumos-host-ip>:9265`
    - Username: worker name or `wallet.workername`
    - Password: anything

developer: WillItMod
website: https://github.com/WillItMod/AxeBCH2
repo: https://github.com/WillItMod/AxeBCH2
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21223
icon: https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-axebch2/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-axebch2/images/1.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-axebch2/images/2.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axebch2-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "BCH2 sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axebch2-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best share"
          text: "21"
          subtext: "G"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
