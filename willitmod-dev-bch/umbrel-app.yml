manifestVersion: 1
id: willitmod-dev-bch
category: bitcoin
name: AxeBCH
version: "0.8.1-rc1-dev"
tagline: BCH node + solo pool
description: >-
  THESE APPS ARE IN DEVELOPMENT. THEY MAY WORK, THEY MAY NOT. THESE ARE FOR TESTING ONLY.
  If you want to support development, then use these apps and provide HELPFUL feedback.
  If you want a working known good app, then DO NOT USE DEV APPS.

  Run a Bitcoin Cash full node (BCHN) and an integrated solo Stratum v1 pool (ckpool) as a single app.


  Features:
    - Axe-style dashboard for node sync and pool stats
    - CashAddr to legacy payout address conversion for ckpool compatibility
    - Difficulty presets (vardiff) tuned for home miners
    - Blocks view for solved blocks, plus optional history scan
    - Community support via Discord


  Miner connection:
    - Set your payout address in the app Settings tab.
    - URL: `stratum+tcp://<your-host-ip>:4567`
    - Username: worker name (optional). `walletAddress.workername` also works, but it does not control payout.
      Example: `rig01.workername`
    - Password: anything


  Notes:
    - For maximum compatibility, use a legacy BCH Base58 address (`1...` / `3...`) as the payout address.
    - Initial sync can take a long time and a lot of bandwidth/storage (the node downloads and validates the chain).
    - Blockchains can carry arbitrary data (e.g. via `OP_RETURN`). That’s not unique to any one chain.
    - Many wallets (e.g. Trust Wallet) show CashAddr (`q...` / `p...`). AxeBCH automatically converts CashAddr to legacy format for ckpool compatibility and shows the converted address.
    - Conversion happens locally on your device; AxeBCH does not send your address to any external service.
    - Reference converter (CashAddr <-> legacy): https://bch.info/en/tools/cashaddr
    - Solo mining is extremely unlikely to find blocks without significant hashrate.
    - First sync can be slow on small or busy systems. SSD strongly recommended.


  Components:
    - Bitcoin Cash Node (BCHN) full node (MIT): https://gitlab.com/bitcoin-cash-node/bitcoin-cash-node
    - ckpool (GPLv3) solo pool engine: https://github.com/ctubio/ckpool


  Status:
    - BETA build: expect bugs and breaking changes. Verify payout addresses before mining.
developer: WillItMod
website: https://github.com/WillItMod/umbrel-dev-community-store
repo: https://github.com/WillItMod/umbrel-dev-community-store
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21212
icon: https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-bch/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-bch/icon.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-bch/images/1.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-bch/images/2.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-bch/images/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axebch-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "BCH sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axebch-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best Share"
          text: "21"
          subtext: "G"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
