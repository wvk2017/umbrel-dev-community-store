manifestVersion: 1
id: axepowpow
category: altcoin
name: "PowPow"
version: "0.2.3-dev"
tagline: LTC + DOGE merged mining (experimental dev)
description: >-
  WARNING: EXPERIMENTAL-DEV (TESTING ONLY)

  May break often. May not work. You have been warned!

  THIS APP IS IN DEVELOPMENT. IT MAY WORK, IT MAY NOT. THIS IS FOR TESTING ONLY.
  If you want to support development, use this app and provide HELPFUL feedback.
  If you want a working known-good app, DO NOT USE DEV APPS.

  Miner connection:
    - URL: `stratum+tcp://<your-5tratumos-host-ip>:9555`
    - Username: `solo.workername`
    - Password: anything
developer: WillItMod
website: https://github.com/WillItMod/PowPow
repo: https://github.com/WillItMod/PowPow
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21221
icon: https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-powpow/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-powpow/images/1.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-powpow/images/2.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-powpow/images/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "powpow-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "PowPow sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "powpow-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best share"
          text: "21"
          subtext: ""
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
