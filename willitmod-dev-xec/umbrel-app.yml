manifestVersion: 1
id: willitmod-dev-xec
category: bitcoin
name: AxeXEC
version: "0.1.3-dev"
tagline: XEC node + solo pool
description: >-
  THESE APPS ARE IN DEVELOPMENT. THEY MAY WORK, THEY MAY NOT. THESE ARE FOR TESTING ONLY.
  If you want to support development, then use these apps and provide HELPFUL feedback.
  If you want a working known good app, then DO NOT USE DEV APPS.

  Run an eCash (XEC) full node and an integrated solo Stratum v1 pool (ckpool) as a single app.


  Features:
    - Axe-style dashboard for node sync and pool stats
    - CashAddr to legacy payout address conversion for ckpool compatibility
    - Difficulty presets (vardiff) tuned for home miners
    - Blocks view for solved blocks, plus optional history scan
    - Community support via Discord


  Miner connection:
    - Set your payout address in the app Settings tab.
    - URL: `stratum+tcp://<your-host-ip>:4321`
    - Username: worker name (optional). `walletAddress.workername` also works, but it does not control payout.
      Example: `rig01.workername`
    - Password: anything


  Notes:
    - For maximum compatibility, use a legacy Base58 address (`1...` / `3...`) as the payout address.
    - Many wallets show CashAddr (`ecash:q...` / `ecash:p...`). AxeXEC automatically converts CashAddr to legacy format for ckpool compatibility and shows the converted address.
    - Conversion happens locally on your device; AxeXEC does not send your address to any external service.
    - Reference converter (CashAddr <-> legacy): https://bch.info/en/tools/cashaddr
    - Solo mining is extremely unlikely to find blocks without significant hashrate.
    - First sync can be slow on small or busy systems. SSD strongly recommended.


  Components:
    - Bitcoin ABC (eCash) full node (MIT): https://github.com/Bitcoin-ABC/bitcoin-abc
    - ckpool (GPLv3) solo pool engine: https://github.com/ctubio/ckpool


  Status:
    - ALPHA build: expect bugs. Verify payout addresses before mining.
developer: WillItMod
website: https://github.com/WillItMod/AxeXEC
repo: https://github.com/WillItMod/AxeXEC
support: https://discord.gg/vC2UrFAbUF
dependencies: []
port: 21218
icon: https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-xec/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-xec/icon.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-xec/images/1.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-xec/images/2.png
  - https://raw.githubusercontent.com/WillItMod/umbrel-dev-community-store/main/willitmod-dev-xec/images/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axexec-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "XEC sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axexec-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best Share"
          text: "21"
          subtext: "G"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
